name: Build Xeno

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: microsoft/setup-msbuild@v1
      
      - name: Build Xeno Release
        run: msbuild Xeno.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Xeno-Release-x64
          path: Xeno/bin/Release/x64/
          retention-days: 30
