name: Build Xeno

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: microsoft/setup-msbuild@v1
      
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        shell: cmd
      
      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install --triplet x64-windows
        shell: cmd
      
      - name: Build Xeno DLL
        run: msbuild Xeno/Xeno.vcxproj /p:Configuration=Release /p:Platform=x64 /m
        env:
          VCPKG_ROOT: C:\vcpkg
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Xeno-Release-x64
          path: |
            Xeno/bin/Release/x64/*.dll
            Xeno/bin/Release/x64/*.pdb
          retention-days: 30
        if: always()
